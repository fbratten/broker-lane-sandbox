version: 2
updates:
  # Keep GitHub Actions (checkout, setup-python, …) patched.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # Python deps. The core is stdlib-only (zero runtime deps); this covers the
  # optional `yaml` extra and any future additions declared in pyproject.toml.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
